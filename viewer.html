<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pdf-resume viewer</title>
    <link rel="stylesheet" href="viewer/viewer.css" />
    <script src="viewer/viewer-entry.mjs" type="module"></script>
  </head>
  <body>
    <main id="viewerError" role="alert" hidden>
      <h1>Unable to open PDF</h1>
      <p id="viewerErrorMessage"></p>
    </main>
    <section
      id="viewerFileAccessInstructions"
      aria-labelledby="viewerFileAccessHeading"
      hidden
    >
      <h1 id="viewerFileAccessHeading">Enable local file access</h1>
      <ol>
        <li>Open the Brave or Chrome main menu.</li>
        <li>Select <strong>Extensions</strong>, then <strong>Manage extensions</strong>.</li>
        <li>Find pdf-resume and select <strong>Details</strong>.</li>
        <li>Turn on <strong>Allow access to file URLs</strong>.</li>
        <li>Return to this viewer and reload this page.</li>
      </ol>
    </section>
    <aside id="viewerWarning" role="status" hidden>
      <strong>Reading position unavailable</strong>
      <span id="viewerWarningMessage"></span>
    </aside>
    <iframe id="pdfViewer" title="PDF viewer" hidden></iframe>
  </body>
</html>
