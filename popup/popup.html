<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pdf-resume</title>
    <link rel="stylesheet" href="popup.css">
    <script src="popup-entry.mjs" type="module"></script>
  </head>
  <body>
    <main id="popupMain" aria-busy="true">
      <h1>pdf-resume</h1>
      <p id="popupStatus" class="status" role="status" aria-live="polite">Checking the active tab…</p>
      <section id="popupBook" aria-labelledby="bookFilename" hidden>
        <h2 id="bookFilename"></h2>
      </section>
      <p id="popupMessage" hidden></p>
      <p id="popupError" role="alert" hidden></p>
      <button id="trackButton" type="button" hidden>Track this book</button>
    </main>
  </body>
</html>
